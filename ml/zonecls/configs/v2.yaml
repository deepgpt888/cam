model:
  name: mobilenet_v3_large
  pretrained: true
  num_classes: 2
  freeze_backbone: false
  fine_tune_blocks: 4

train:
  input_size: 224
  batch_size: 32
  epochs: 18
  learning_rate: 0.0003
  weight_decay: 0.0001
  num_workers: 2
  train_split: 0.8
  seed: 42

data:
  dataset_dir: /content/drive/MyDrive/dataset_zonecls_v2
  output_dir: /content/zonecls_runs/v2
  class_names: ["empty", "occupied"]
