model:
  name: mobilenet_v3_large
  pretrained: true
  num_classes: 2
  freeze_backbone: true
  fine_tune_blocks: 0

train:
  input_size: 224
  batch_size: 32
  epochs: 12
  learning_rate: 0.0005
  weight_decay: 0.0001
  num_workers: 2
  train_split: 0.8
  seed: 42

data:
  dataset_dir: /content/drive/MyDrive/dataset_zonecls_v1
  output_dir: /content/zonecls_runs/v1
  class_names: ["empty", "occupied"]
