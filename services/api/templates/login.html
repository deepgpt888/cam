<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CamPark - Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #050a18;
      --bg-panel: rgba(15, 23, 50, 0.85);
      --bg-input: rgba(10, 16, 36, 0.7);
      --border: rgba(56, 189, 248, 0.12);
      --border-focus: #38bdf8;
      --text-main: #e2e8f0;
      --text-dim: #94a3b8;
      --text-placeholder: #475569;
      --accent: #38bdf8;
      --accent-2: #818cf8;
      --accent-3: #22c55e;
      --accent-hover: #0ea5e9;
      --bad: #ef4444;
      --glow: rgba(56, 189, 248, 0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Space Grotesk", "Segoe UI", Tahoma, sans-serif;
      background: var(--bg-base);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Animated background ── */
    canvas#bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* Gradient orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      z-index: 0;
      animation: orbFloat 20s ease-in-out infinite;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(56,189,248,0.3), transparent 70%);
      top: -15%; left: -10%;
      animation-duration: 22s;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(129,140,248,0.25), transparent 70%);
      bottom: -10%; right: -5%;
      animation-duration: 18s;
      animation-delay: -5s;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(34,197,94,0.2), transparent 70%);
      top: 50%; left: 60%;
      animation-duration: 25s;
      animation-delay: -10s;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -40px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(15px, 30px) scale(1.02); }
    }

    /* ── Login card ── */
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      position: relative;
      z-index: 10;
      animation: cardEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes cardEntry {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .login-card {
      background: var(--bg-panel);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px 40px;
      box-shadow:
        0 0 0 1px rgba(56,189,248,0.06),
        0 8px 40px rgba(0, 0, 0, 0.5),
        0 0 80px rgba(56,189,248,0.05);
      position: relative;
      overflow: hidden;
    }
    /* Shimmer border */
    .login-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 21px;
      padding: 1px;
      background: linear-gradient(
        135deg,
        rgba(56,189,248,0.3),
        transparent 40%,
        transparent 60%,
        rgba(129,140,248,0.3)
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation: shimmer 4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* ── Logo ── */
    .logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 18px;
      margin-bottom: 18px;
      font-size: 28px;
      box-shadow: 0 4px 24px rgba(56,189,248,0.25);
      animation: iconPulse 3s ease-in-out infinite;
      position: relative;
    }
    .logo-icon::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      opacity: 0.15;
      animation: iconGlow 3s ease-in-out infinite;
    }
    @keyframes iconPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    @keyframes iconGlow {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50% { opacity: 0.25; transform: scale(1.1); }
    }
    .logo h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #e2e8f0, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo p {
      font-size: 14px;
      color: var(--text-dim);
      margin-top: 6px;
      letter-spacing: 0.3px;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 22px;
      animation: fieldEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .form-group:nth-child(1) { animation-delay: 0.15s; }
    .form-group:nth-child(2) { animation-delay: 0.25s; }
    @keyframes fieldEntry {
      from { opacity: 0; transform: translateX(-12px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-dim);
      transition: color 0.3s;
      pointer-events: none;
    }
    .form-group input {
      width: 100%;
      padding: 13px 16px 13px 44px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 15px;
      transition: all 0.3s;
      outline: none;
    }
    .form-group input::placeholder { color: var(--text-placeholder); }
    .form-group input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.1), 0 0 20px rgba(56,189,248,0.05);
    }
    .form-group input:focus + svg,
    .form-group:focus-within svg { color: var(--accent); }

    /* ── Button ── */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 6px;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.3px;
      animation: fieldEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both;
    }
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }
    .btn-login:hover::before { transform: translateX(100%); }
    .btn-login:hover {
      box-shadow: 0 4px 24px rgba(56,189,248,0.3);
      transform: translateY(-1px);
    }
    .btn-login:active { transform: translateY(0) scale(0.98); }

    /* ── Error ── */
    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: var(--bad);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 22px;
      text-align: center;
      animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }
    @keyframes shake {
      10%, 90% { transform: translateX(-1px); }
      20%, 80% { transform: translateX(2px); }
      30%, 50%, 70% { transform: translateX(-3px); }
      40%, 60% { transform: translateX(3px); }
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--text-dim);
      opacity: 0.6;
      animation: fieldEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
    }

    /* ── Scan line (subtle) ── */
    .scanline {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.15;
      z-index: 1;
      animation: scanDown 8s linear infinite;
    }
    @keyframes scanDown {
      0% { top: -2px; }
      100% { top: 100vh; }
    }
  </style>
</head>
<body>
  <!-- Animated background -->
  <canvas id="bg"></canvas>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="scanline"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon">🅿️</div>
        <h1>CamPark</h1>
        <p>Parking Intelligence Platform</p>
      </div>

      {% if error %}
      <div class="error-msg">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <input type="text" id="username" name="username" placeholder="Enter username"
                   value="{{ request.form.get('username', '') }}" autofocus required>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" name="password" placeholder="Enter password" required>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
        </div>
        <button type="submit" class="btn-login">Sign In &rarr;</button>
      </form>
    </div>
    <div class="footer">CamPark v{{ version }} &middot; Secure Access</div>
  </div>

  <script>
    // ── Particle network background ──
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let w, h, particles;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.r = Math.random() * 1.5 + 0.5;
        this.alpha = Math.random() * 0.5 + 0.2;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > w) this.vx *= -1;
        if (this.y < 0 || this.y > h) this.vy *= -1;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(56, 189, 248, ${this.alpha})`;
        ctx.fill();
      }
    }

    const count = Math.min(80, Math.floor((w * h) / 15000));
    particles = Array.from({ length: count }, () => new Particle());

    function animate() {
      ctx.clearRect(0, 0, w, h);
      particles.forEach(p => { p.update(); p.draw(); });
      // Draw connections
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 130) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(56, 189, 248, ${0.08 * (1 - dist / 130)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
