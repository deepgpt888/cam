<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CamPark Admin - Health</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    th { background: #f5f5f5; }
    .status-ONLINE { color: #1a7f37; }
    .status-STALE { color: #b78103; }
    .status-OFFLINE { color: #b42318; }
  </style>
</head>
<body>
  <h1>CamPark Health</h1>
  <table>
    <thead>
      <tr>
        <th>Camera ID</th>
        <th>Status</th>
        <th>Last Seen</th>
        <th>Age (seconds)</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <script>
    async function loadHealth() {
      const resp = await fetch('/admin/health.json');
      const data = await resp.json();
      const tbody = document.getElementById('rows');
      tbody.innerHTML = '';
      data.cameras.forEach(cam => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${cam.camera_id}</td>
          <td class="status-${cam.status}">${cam.status}</td>
          <td>${cam.last_seen_at || ''}</td>
          <td>${cam.age_seconds !== null ? cam.age_seconds.toFixed(0) : ''}</td>
        `;
        tbody.appendChild(row);
      });
    }

    loadHealth();
    setInterval(loadHealth, 30000);
  </script>
</body>
</html>
